services:
  postgres:
    image: postgres:16-alpine
    container_name: multiplex-postgres
    environment:
      POSTGRES_USER: multiplex
      POSTGRES_PASSWORD: multiplex
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U multiplex"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: multiplex-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: multiplex
      RABBITMQ_DEFAULT_PASS: multiplex
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: multiplex-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@multiplex.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
